<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 2000 260"
     preserveAspectRatio="xMidYMid slice">

  <!-- Sky -->
  <rect width="2000" height="260" fill="#87CEEB" />

  <!-- Road -->
  <rect y="160" width="2000" height="100" fill="#2E2E2E" />
  <rect y="165" width="2000" height="5" fill="white" />
  <rect y="250" width="2000" height="5" fill="white" />

  <!-- Yellow dashed line -->
  <g stroke="#FFD700" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="205" x2="80" y2="205" />
    <line x1="120" y1="205" x2="200" y2="205" />
    <line x1="240" y1="205" x2="320" y2="205" />
    <line x1="360" y1="205" x2="440" y2="205" />
    <line x1="480" y1="205" x2="560" y2="205" />
    <line x1="600" y1="205" x2="680" y2="205" />
    <line x1="720" y1="205" x2="800" y2="205" />
    <line x1="840" y1="205" x2="920" y2="205" />
    <line x1="960" y1="205" x2="1040" y2="205" />
    <line x1="1080" y1="205" x2="1160" y2="205" />
    <line x1="1200" y1="205" x2="1280" y2="205" />
    <line x1="1320" y1="205" x2="1400" y2="205" />
    <line x1="1440" y1="205" x2="1520" y2="205" />
    <line x1="1560" y1="205" x2="1640" y2="205" />
    <line x1="1680" y1="205" x2="1760" y2="205" />
    <line x1="1800" y1="205" x2="1880" y2="205" />
    <line x1="1920" y1="205" x2="2000" y2="205" />
  </g>

  <!-- Cyclist group -->
  <g id="cyclist" fill="#000" stroke="#000" stroke-width="3">

    <!-- Rear wheel -->
    <circle cx="0" cy="0" r="15" />

    <!-- Front wheel -->
    <circle cx="50" cy="0" r="15" />

    <!-- Frame -->
    <polyline points="0,0 20,-25 50,0" fill="none" />
    <line x1="20" y1="-25" x2="25" y2="-40" />
    <line x1="30" y1="-25" x2="50" y2="-5" />

    <!-- Rider -->
    <circle cx="25" cy="-45" r="7" />
    <line x1="25" y1="-40" x2="10" y2="-15" />
    <line x1="10" y1="-15" x2="20" y2="0" />
    <line x1="25" y1="-40" x2="40" y2="-15" />
    <line x1="40" y1="-15" x2="30" y2="0" />

  </g>

  <!-- Motion: left → right -->
  <animateMotion
      xlink:href="#cyclist"
      dur="8s"
      repeatCount="indefinite"
      path="M -200 205 L 2200 205" />

</svg>
