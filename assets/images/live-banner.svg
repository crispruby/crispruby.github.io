<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 2000 260"
     preserveAspectRatio="xMidYMid slice">

  <!-- Sky -->
  <rect width="2000" height="260" fill="#87CEEB" />

  <!-- Sun -->
  <circle cx="1750" cy="50" r="30" fill="#FFD966" />

  <!-- Road background -->
  <rect y="160" width="2000" height="100" fill="#2E2E2E" />

  <!-- White shoulder lines -->
  <rect y="165" width="2000" height="5" fill="white" />
  <rect y="250" width="2000" height="5" fill="white" />

  <!-- Yellow dashed center line -->
  <g stroke="#FFD700" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="205" x2="80" y2="205" />
    <line x1="120" y1="205" x2="200" y2="205" />
    <line x1="240" y1="205" x2="320" y2="205" />
    <line x1="360" y1="205" x2="440" y2="205" />
    <line x1="480" y1="205" x2="560" y2="205" />
    <line x1="600" y1="205" x2="680" y2="205" />
    <line x1="720" y1="205" x2="800" y2="205" />
    <line x1="840" y1="205" x2="920" y2="205" />
    <line x1="960" y1="205" x2="1040" y2="205" />
    <line x1="1080" y1="205" x2="1160" y2="205" />
    <line x1="1200" y1="205" x2="1280" y2="205" />
    <line x1="1320" y1="205" x2="1400" y2="205" />
    <line x1="1440" y1="205" x2="1520" y2="205" />
    <line x1="1560" y1="205" x2="1640" y2="205" />
    <line x1="1680" y1="205" x2="1760" y2="205" />
    <line x1="1800" y1="205" x2="1880" y2="205" />
    <line x1="1920" y1="205" x2="2000" y2="205" />
  </g>

  <!-- Cyclist position -->
  <!-- Center of cyclist: (300,205) -->

  <!-- Rear wheel -->
  <circle cx="275" cy="205" r="15" fill="none" stroke="#000" stroke-width="3" />
  <animateTransform attributeName="transform"
                    type="rotate"
                    from="0 275 205"
                    to="360 275 205"
                    dur="0.8s"
                    repeatCount="indefinite" />

  <!-- Front wheel -->
  <circle cx="325" cy="205" r="15" fill="none" stroke="#000" stroke-width="3" />
  <animateTransform attributeName="transform"
                    type="rotate"
                    from="0 325 205"
                    to="360 325 205"
                    dur="0.8s"
                    repeatCount="indefinite" />

  <!-- Bike frame -->
  <polyline points="275,205 295,180 325,205"
            fill="none" stroke="#000" stroke-width="3" />
  <line x1="295" y1="180" x2="298" y2="165" stroke="#000" stroke-width="3" />
  <line x1="305" y1="178" x2="325" y2="200" stroke="#000" stroke-width="3" />

  <!-- Rider -->
  <circle cx="298" cy="160" r="7" />
  <line x1="298" y1="165" x2="285" y2="190" stroke="#000" stroke-width="3" />
  <line x1="285" y1="190" x2="295" y2="205" stroke="#000" stroke-width="3" />
  <line x1="298" y1="165" x2="312" y2="190" stroke="#000" stroke-width="3" />
  <line x1="312" y1="190" x2="305" y2="205" stroke="#000" stroke-width="3" />

</svg>
